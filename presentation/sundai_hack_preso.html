<div style="font-size: 1.15em;">
<ul>
<li><strong>ML training data</strong>
<ul>
<li>Sequence + timing + pressure = richer signal than pixels</li>

<li><strong>Interactivity</strong>
<ul>
<li>Strokes are discrete objects you can select, move, erase, assign to elements</li>
</ul>
</li>
<li><strong>Resolution independence</strong>
<ul>
<li>Renders perfectly at any zoom level</li>
</ul>
</li>
<li><strong>More efficient to store</strong>
<ul>
<li>For a text-heavy meeting note, just points, no bitmaps.</li>
</ul>
</li>
</ul>

<p><strong>Path 1: Direct structure interpretation</strong></p>
<ul>
<li>TicTacToe detects # grid from 4 line strokes</li>

<li>More work, but enables natural creation</li>
</ul>
<p><strong>Path 2: Rectangle-with-X catalog</strong></p>
<ul>
<li>Draw a rectangle → cross it with an X → pick from a menu</li>
<li>Just: <code>render()</code> + <code>acceptInk()</code></li>
<li><strong>Easier for hack project</strong></li>

<h2 id="research-challenge-tokenization">Research challenge: Tokenization</h2>
<div class="cols">
<div class="left">
<ul>
<li><strong>Point-by-point is the norm</strong>
<ul>
<li><a href="https://arxiv.org/abs/2504.00051">Cursive Transformer</a>, <a href="https://arxiv.org/abs/2508.21098">TrInk</a> tokenize each point as polar offsets</li>
<li>Works — but ~286 tokens/word, like spelling text one char at a time</li>
<li>Long sequences limit context window and slow inference</li>
</ul>
</li>
<li><strong>Bezier fitting ≈ byte-pair encoding for strokes</strong>
<ul>
<li>Cubic curves: 4 control points capture what dozens of samples do</li>
<li>2–8× compression: ~30 segments/word vs ~250 raw points</li>
<li>Loops and corners are hard — naive fitting shortcuts through them</li>
</ul>
</li>
<li><strong>Open questions</strong>
<ul>
<li>Encoding the Bezier octet (8 floats) as discrete transformer tokens</li>
<li>Cumulative drift from autoregressive relative-coordinate generation</li>
<li>Whether compression gains actually improve generation quality</li>
</ul>
</li>
</ul>
</div>
<div class="right">
<img src="assets/tokenization-viz.png" />
</div>
</div>

<h2 id="research-challenge-inksight">Research challenge: InkSight</h2>
<div class="cols">
<div class="left">
<ul>
<li><strong>Offline → online conversion</strong>
<ul>
<li>Extract stroke data (x, y, pen state) from handwriting images</li>
<li><a href="https://arxiv.org/abs/2402.05804">InkSight</a> works well on clean, non-cursive, word-level crops</li>
<li>Full pages need OCR line detection first — imperfect today</li>
</ul>
</li>
<li><strong>Training data is the bottleneck</strong>
<ul>
<li>Millions of handwriting images; almost no stroke-level datasets</li>
<li>Fonts = filled outlines, not strokes — need skeletonization</li>
<li>Quality-sensitive: blur, tilt, shadows, cursive joins all hurt</li>
</ul>
</li>
<li><strong>Open questions</strong>
<ul>
<li>Scaling to cursive and connected scripts with high fidelity</li>
<li>Font skeleton → plausible stroke order, direction, and dynamics</li>
<li>Bridging the domain gap between synthetic and natural strokes</li>
</ul>
</li>
</ul>
</div>

<h2 id="research-challenge-multi-writer-models">Research challenge: Multi-writer models</h2>
<div class="cols">
<div class="left">
<ul>
<li><strong>Style-aware synthesis</strong>
<ul>
<li>Generate handwriting in any writer's style</li>
<li>Disentangle content (what) from style (how) in strokes</li>
<li>BRUSH: 170 writers, same prompt = direct comparison</li>
</ul>
</li>
<li><strong>Stroke beautification</strong>
<ul>
<li>Make rough strokes nicer (stroke-to-stroke)</li>
<li>Preserve writer identity while improving legibility</li>
<li>Geometry problem, not pixels — work on polylines</li>
</ul>
</li>
<li><strong>Open questions</strong>
<ul>
<li>Encoding style / teaching what &quot;nicer&quot; means</li>
<li>Matching local style variations (e.g. CAPS vs cursive)</li>
<li>Objective metrics for &quot;nicer&quot; handwriting</li>
</ul>
</li>
</ul>
</div>
<div class="right">

}

<h2 id="research-challenge-inkteractivity-foundation-model">Research challenge: Inkteractivity foundation model</h2>
<div class="content">
<ul>
<li><strong>One model, full pipeline</strong>
<ul>
<li>Suno = compose + arrange + perform + produce music. Do that for ink</li>
<li>Creation + interaction unified — no recognize-then-hand-off</li>
<li>Mixed pages: text, sketches, annotations, widgets parsed as one</li>
</ul>
</li>
<li><strong>Universal ink understanding</strong>
<ul>
<li>Text, math, chemistry, diagrams, games — all from the same strokes</li>
<li>Structures become interactive: grid → game, circuit → simulation</li>
<li>Native gestures + context-aware: same mark adapts to surroundings</li>
</ul>
</li>
<li><strong>Learns from every stroke</strong>
<ul>
<li>Adapts from corrections in real time</li>
<li>Style-preserving: generated content matches your handwriting</li>
<li>Data flywheel: every stroke and correction feeds back into the model</li>
</ul>
</li>
</ul>
